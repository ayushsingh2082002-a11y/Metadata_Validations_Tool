<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metadata Validation Tool</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .upload-box {
            background: #1f2937;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: black;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #2563eb;
            color: white;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background: #f3f4f6;
        }

        .btn {
            background: #2563eb;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

    <h1>JSON Metadata Extractor</h1>

    <div class="upload-box">
        <label><strong>Upload Multiple JSON Files</strong></label><br><br>

        <input type="file" id="jsonFiles" multiple accept=".json">
        <br>

        <button class="btn" onclick="processFiles()">
            Extract Metadata
        </button>
    </div>

    <table id="resultTable">

        <thead>
            <tr>
                <th>EventName</th></th>
                <th>heEventTypeName</th>
                <th>performChannel</th>
                <th>languages</th>
                <th>clientContentId</th>
                <th>eventId</th>
                <th>channel</th>
                <th>tier</th>
                <th>watermarking</th>
                <th>Dolby Audio</th>
            </tr>
        </thead>

        <tbody></tbody>

    </table>

    <script>

        async function processFiles() {

            const files = document.getElementById("jsonFiles").files;

            const tbody = document.querySelector("#resultTable tbody");

            tbody.innerHTML = "";

            for (const file of files) {

                try {

                    const text = await file.text();

                    const data = JSON.parse(text);

                    let description = cleanText(data.description || "");

                    let eventType = data.heEventTypeName || "";

                    let performChannel = data.performChannel || "";

                    let channel = data.channel || "";

                    let tier = data.tier || "";

                    let watermarking = data.watermarking || "";

                    let clientContentId = data.clientContentId || "";

                    let eventId = data.eventId || "";

                    let languages = "";

                    const variants = data.variants || {};

                    for (const key in variants) {

                        const variant = variants[key];

                        if (typeof variant === "object") {

                            if (variant.languages) {
                                languages = variant.languages.join(", ");
                            }
                        }
                    }

                    let dolbyAudio = "No";

                    if (JSON.stringify(data).toLowerCase().includes("dolby")) {
                        dolbyAudio = "Yes";
                    }

                    const row = `
                        <tr>
                            <td>${description}</td>
                            <td>${eventType}</td>
                            <td>${performChannel}</td>
                            <td>${languages}</td>
                            <td>${clientContentId}</td>
                            <td>${eventId}</td>
                            <td>${channel}</td>
                            <td>${tier}</td>
                            <td>${watermarking}</td>
                            <td>${dolbyAudio}</td>
                        </tr>
                    `;

                    tbody.innerHTML += row;

                } catch (error) {

                    console.error("Invalid JSON File:", file.name);

                    const errorRow = `
                        <tr>
                            <td colspan="10">
                                Error reading file: ${file.name}
                            </td>
                        </tr>
                    `;

                    tbody.innerHTML += errorRow;
                }
            }
        }

        function cleanText(text) {
            return text.replace(/<br\s*\/?>/gi, "").trim();
        }

    </script>

</body>

</html>
